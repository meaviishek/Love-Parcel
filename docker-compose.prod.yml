version: "3.9"

# ─────────────────────────────────────────────────────────────────────
# Production Docker Compose — used on the EC2 server
# Images are pulled from Amazon ECR (not built here)
# ─────────────────────────────────────────────────────────────────────

services:
  backend:
    image: ${ECR_REGISTRY}/loveparcel-backend:latest
    container_name: loveparcel-backend
    restart: always
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    networks:
      - loveparcel-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ${ECR_REGISTRY}/loveparcel-frontend:latest
    container_name: loveparcel-frontend
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - loveparcel-network

  nginx:
    image: nginx:alpine
    container_name: loveparcel-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro          # SSL certs from Certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro        # Let's Encrypt certs
    depends_on:
      - backend
      - frontend
    networks:
      - loveparcel-network

networks:
  loveparcel-network:
    driver: bridge
