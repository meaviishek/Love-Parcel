version: "3.9"

# ─────────────────────────────────────────────────────────────────────
# PRODUCTION — No domain, IP-only access
# Frontend  → http://13.60.188.45:3000
# Backend   → http://13.60.188.45:5000
# Usage: ECR_REGISTRY=... IMAGE_TAG=... docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────

services:
  backend:
    image: ${ECR_REGISTRY}/loveparcel-backend:${IMAGE_TAG:-latest}
    container_name: loveparcel-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    networks:
      - loveparcel-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: ${ECR_REGISTRY}/loveparcel-frontend:${IMAGE_TAG:-latest}
    container_name: loveparcel-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - loveparcel-network

networks:
  loveparcel-network:
    driver: bridge
