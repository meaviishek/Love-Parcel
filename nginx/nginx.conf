# ─────────────────────────────────────────────────────────────────
# LoveParcel — Nginx (HTTP only, no domain)
# NOTE: nginx is NOT used in the no-domain setup.
# This file is kept for future use when a domain is added.
# Currently frontend runs directly on :3000 and backend on :5000
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Route /api/* to backend
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # All other traffic to frontend
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
